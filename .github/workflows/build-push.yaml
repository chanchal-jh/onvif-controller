name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'VERSION'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from file
        id: version
        run: |
          # Expects a file named VERSION at repo root containing e.g. 1.0.0
          RAW_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$RAW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  

  update-helm-chart:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm chart repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in values.yaml
        run: |
          yq -i '.image.tag = "${{ needs.build-and-push.outputs.image-tag }}"' helm-chart/values.yaml

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: 'helm-chart/values.yaml'
          message: "Update image.tag with new tag ${{ needs.build-and-push.outputs.image-tag }}"

          

  deploy:
    needs: update-helm-chart
    runs-on: self-hosted
    steps:

      - name: Install argocd
        shell: bash
        run: |
          curl -ksSL -o argocd https://argocd-server.argocd/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd

      - name: Argocd app sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure  \
            --username admin \
            --password  ${{ secrets.ARGOCD_PASSWORD }}
          argocd app sync camera-controller